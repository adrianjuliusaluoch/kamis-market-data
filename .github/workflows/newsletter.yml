name: Market Price Newsletter for Dry Maize

on:
  schedule:
    - cron: '45 4 * * *'  # 7:45 AM EAT / 4:45 AM UTC, every day
  workflow_dispatch:  # ✅ Enables manual trigger

concurrency:
  group: newsletter-maize-gm
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  get_and_upload_market_data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3  # Updated to v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Set up Google Cloud credentials
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}' # Replace with the name of your GitHub Actions secret

    - name: Run your script
      env:
        GENAI_API_KEY: ${{ secrets.GENAI_API_KEY }}
      run: |
        jupyter nbconvert --to notebook --execute newsletter.ipynb --output executed_newsletter.ipynb
    
    - name: Add timestamp to executed notebook
      run: python3 -c "import json, datetime, pathlib; from datetime import timezone; nb_file=pathlib.Path('newsletter.ipynb'); nb=json.loads(nb_file.read_text(encoding='utf-8')); nb.setdefault('metadata', {})['last_run_utc']=datetime.datetime.now(timezone.utc).isoformat(); nb_file.write_text(json.dumps(nb, indent=1), encoding='utf-8')"

    - name: Commit newsletter.ipynb
      run: |
        git config --global user.name "adrianjuliusaluoch"
        git config --global user.email "adrianjuliusaluoch@gmail.com"
        git add newsletter.ipynb
        git commit -m "Keep workflow alive [skip ci]" || echo "No changes to commit"
        git pull --rebase origin main
        git push origin HEAD:main
      continue-on-error: true
