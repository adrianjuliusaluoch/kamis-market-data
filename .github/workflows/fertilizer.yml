name: Upload KAMIS Fertilizer Market Prices to Google BigQuery

on:
  schedule:
    - cron: '0 9,21 * * *'  # Runs at 12:00 PM and 12:00 AM Nairobi time
  workflow_dispatch:  # ✅ Enables manual trigger

concurrency:
  group: upload-kamis-fertilizer-bq
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  get_and_upload_market_data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3  # Updated to v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Set up Google Cloud credentials
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}' # Replace with the name of your GitHub Actions secret

    - name: Run your script
      run: |
        python fertilizer.py

    - name: Update and commit fertilizer.py
      run: |
        # Add or update a timestamp comment at top of file
        sed -i "1s|^# Last run:.*|# Last run: $(date -u)|; 1t; 1i # Last run: $(date -u)" fertilizer.py

        git config --global user.name "adrianjuliusaluoch"
        git config --global user.email "adrianjuliusaluoch@gmail.com"
        git add fertilizer.py
        git commit -m "Keep workflow alive [skip ci]" || echo "No changes to commit"
        git pull --rebase origin main
        git push
      continue-on-error: true
