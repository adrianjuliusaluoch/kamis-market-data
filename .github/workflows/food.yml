name: Upload KAMIS Food Market Prices to Google BigQuery

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:  # ✅ Enables manual trigger

permissions:
  contents: write

jobs:
  get_and_upload_market_data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3  # Updated to v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Set up Google Cloud credentials
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}' # Replace with the name of your GitHub Actions secret

    - name: Run your script
      run: |
        python food.py

    - name: Update and commit food.py
      run: |
        # Add or update a timestamp comment at top of file
        sed -i "1s|^# Last run:.*|# Last run: $(date -u)|; 1t; 1i # Last run: $(date -u)" food.py

        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add food.py
        git commit -m "Auto update food.py timestamp [skip ci]" || echo "No changes"
        git push
